            justify-content: center;

            user-select: none;
            padding: 16px;
        }
        .slider-container {
            position: relative;
            max-width: 96vw;
            max-height: 92vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #slideshow {
            max-width: 96vw;
            max-height: 70vh;
            border-radius: 18px;
            box-shadow: 0 12px 48px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.04);
            display: block;
            background: #1a1a1a;
            object-fit: contain;
            transition: opacity 0.15s ease;
        }
        .controls {
            margin-top: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        .controls-top {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            color: rgba(255,255,255,0.85);
            background: rgba(20,20,20,0.6);
            backdrop-filter: blur(10px);
            padding: 10px 24px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            flex-wrap: wrap;
            width: 100%;
        }
        .controls-bottom {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.7);
            background: rgba(20,20,20,0.4);
            backdrop-filter: blur(6px);
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.05);
            flex-wrap: wrap;
            width: 100%;
            max-width: 600px;
        }
        button {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            font-size: 18px;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        button:hover {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.3);
            transform: scale(1.02);
        }
        button:active {
            transform: scale(0.96);
        }
        button.active {
            background: rgba(255, 50, 50, 0.25);
            border-color: rgba(255, 50, 50, 0.5);
            box-shadow: 0 0 20px rgba(255, 50, 50, 0.15);
        }
        #counter {
            font-size: 16px;
            font-weight: 400;
            min-width: 80px;
            text-align: center;
            opacity: 0.8;
            background: rgba(0,0,0,0.2);
            padding: 4px 14px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }
        .slide-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.2);
            padding: 4px 12px 4px 16px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }
        .speed-control label {
            font-size: 13px;
            opacity: 0.7;
            color: white;
            cursor: pointer;
        }
        .speed-control input[type="range"] {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        .speed-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255,255,255,0.8);
            cursor: pointer;
            transition: 0.2s;
        }
        .speed-control input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }
        .speed-control input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.8);
            cursor: pointer;
        }
        .speed-value {
            color: white;
            font-size: 14px;
            font-weight: 500;
            min-width: 36px;
            text-align: center;
            opacity: 0.9;
        }
        .page-nav {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .page-nav input {
            width: 60px;
            padding: 4px 8px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.4);
            color: white;
            font-size: 14px;
            text-align: center;
            outline: none;
            transition: 0.2s;
        }
        .page-nav input:focus {
            border-color: rgba(255,255,255,0.4);
            background: rgba(0,0,0,0.6);
        }
        .page-nav input::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }
        .page-nav input[type="number"] {
            -moz-appearance: textfield;
        }
        .page-nav button {
            font-size: 14px;
            padding: 4px 12px;
        }
        .filename-display {
            font-size: 13px;
            opacity: 0.6;
            color: rgba(255,255,255,0.7);
            font-family: 'Courier New', monospace;
            letter-spacing: 0.3px;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .hint {
            color: rgba(255,255,255,0.15);
            font-size: 11px;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }
        @media (max-width: 700px) {
            .controls-top {
                gap: 10px;
                padding: 8px 14px;
                border-radius: 30px;
            }
            button {
                font-size: 15px;
                padding: 4px 12px;
            }
            #counter {
                font-size: 14px;
                min-width: 60px;
            }
            .speed-control input[type="range"] {
                width: 60px;
            }
            .speed-control label {
                font-size: 11px;
            }
            .speed-value {
                font-size: 12px;
                min-width: 28px;
            }
            #slideshow {
                max-height: 60vh;
            }
            .controls-bottom {
                padding: 6px 12px;
                gap: 8px;
            }
            .filename-display {
                font-size: 11px;
                max-width: 150px;

            .page-nav input {

                width: 40px;
                font-size: 11px;
                padding: 2px 4px;

        // ==============================================================
        //  BASE URL
        // ==============================================================
        const baseUrl = 'https://item1000-collab.github.io/dprk-photos/web/';

        const photoUrls = photoNames.map(name => baseUrl + name);
        const totalPhotos = photoUrls.length;

        // DOM elements
        const imgElement = document.getElementById('slideshow');
        const counterElement = document.getElementById('counter');
        const filenameDisplay = document.getElementById('filenameDisplay');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const playBtn = document.getElementById('playBtn');
        const speedSlider = document.getElementById('speedSlider');
        const speedDisplay = document.getElementById('speedDisplay');
        const pageInput = document.getElementById('pageInput');
        const goBtn = document.getElementById('goBtn');
        const goStartBtn = document.getElementById('goStartBtn');
        const goEndBtn = document.getElementById('goEndBtn');

        let currentIndex = 0;
        let slideInterval = null;
        let isPlaying = false;
        let slideDuration = 5; // seconds

        // ==============================================================
        //  UPDATE SLIDE FUNCTION
        // ==============================================================
        function updateSlide(index) {
            if (index < 0) index = 0;
            if (index >= totalPhotos) index = totalPhotos - 1;

            currentIndex = index;
            imgElement.src = photoUrls[currentIndex];
            counterElement.textContent = `${currentIndex + 1} / ${totalPhotos}`;
            filenameDisplay.textContent = photoNames[currentIndex];
            pageInput.value = currentIndex + 1;

            // Preload neighboring photos
            const nextIndex = currentIndex + 1;
            if (nextIndex < totalPhotos) {
                const preloadNext = new Image();
                preloadNext.src = photoUrls[nextIndex];
            }

            const prevIndex = currentIndex - 1;
            if (prevIndex >= 0) {
                const preloadPrev = new Image();
                preloadPrev.src = photoUrls[prevIndex];
            }
        }

        // ==============================================================
        //  SLIDESHOW CONTROLS
        // ==============================================================
        function startSlideshow() {
            if (slideInterval) {
                clearInterval(slideInterval);
                slideInterval = null;
            }
            isPlaying = true;
            playBtn.textContent = '⏸ Pause';
            playBtn.classList.add('active');
            
            slideInterval = setInterval(() => {
                if (currentIndex < totalPhotos - 1) {
                    updateSlide(currentIndex + 1);
                } else {
                    updateSlide(0);
                }
            }, slideDuration * 1000);
        }

        function stopSlideshow() {
            if (slideInterval) {
                clearInterval(slideInterval);
                slideInterval = null;
            }
            isPlaying = false;
            playBtn.textContent = '▶ Play';
            playBtn.classList.remove('active');
        }

        function toggleSlideshow() {
            if (isPlaying) {
                stopSlideshow();
            } else {
                startSlideshow();
            }
        }

        // ==============================================================
        //  SPEED CONTROL
        // ==============================================================
        speedSlider.addEventListener('input', function() {
            slideDuration = parseFloat(this.value);
            speedDisplay.textContent = slideDuration + 's';
            
            if (isPlaying) {
                startSlideshow();
            }
        });

        // ==============================================================
        //  PAGE NAVIGATION
        // ==============================================================
        function goToPage(pageNum) {
            const index = pageNum - 1;
            if (index >= 0 && index < totalPhotos) {
                if (isPlaying) stopSlideshow();
                updateSlide(index);
            }
        }

        goBtn.addEventListener('click', function() {
            const pageNum = parseInt(pageInput.value);
            if (!isNaN(pageNum) && pageNum >= 1 && pageNum <= totalPhotos) {
                goToPage(pageNum);
            } else {
                pageInput.value = currentIndex + 1;
            }
        });

        pageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                goBtn.click();
            }
        });

        goStartBtn.addEventListener('click', function() {
            if (isPlaying) stopSlideshow();
            updateSlide(0);
        });

        goEndBtn.addEventListener('click', function() {
            if (isPlaying) stopSlideshow();
            updateSlide(totalPhotos - 1);
        });

        // ==============================================================
        //  BUTTON & KEYBOARD HANDLERS
        // ==============================================================
        prevBtn.addEventListener('click', () => {
            if (isPlaying) stopSlideshow();
            if (currentIndex > 0) updateSlide(currentIndex - 1);
        });

        nextBtn.addEventListener('click', () => {
            if (isPlaying) stopSlideshow();
            if (currentIndex < totalPhotos - 1) updateSlide(currentIndex + 1);
        });

        playBtn.addEventListener('click', toggleSlideshow);

        window.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                toggleSlideshow();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                if (isPlaying) stopSlideshow();
                if (currentIndex < totalPhotos - 1) updateSlide(currentIndex + 1);
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                if (isPlaying) stopSlideshow();
                if (currentIndex > 0) updateSlide(currentIndex - 1);
            }
        });

        // ==============================================================
        //  START
        // ==============================================================
        updateSlide(0);

        console.log(`✅ Loaded ${totalPhotos} photos`);
        console.log('📸 First photo:', photoUrls[0]);
        console.log('📸 Last photo:', photoUrls[photoUrls.length - 1]);
        console.log('⏱ Default slide duration: 5s');
    })();
